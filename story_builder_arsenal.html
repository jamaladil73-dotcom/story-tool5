<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Story Builder — Arsenal Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:Cairo,sans-serif; background:#f5f5f5; color:#111; direction:rtl; min-height:100vh; }
  .app { max-width:500px; margin:0 auto; padding:16px; }
  h1 { font-size:20px; font-weight:900; text-align:center; margin-bottom:16px; color:#CC2200; }
  .preview-box { width:100%; aspect-ratio:9/16; border-radius:16px; overflow:hidden;
    border:2px solid #f0d0cc; margin-bottom:16px; background:#fff;
    box-shadow:0 4px 24px rgba(204,34,0,0.15); }
  canvas { width:100%; height:100%; display:block; }
  .card { background:#fff; border:1px solid #eee; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,0.05); }
  .card-title { font-size:12px; color:#CC2200; margin-bottom:12px; font-weight:700; letter-spacing:1px; }
  .upload-btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
    padding:14px; border-radius:12px; border:2px dashed #CC2200; background:rgba(204,34,0,0.05);
    color:#CC2200; font-size:15px; font-weight:700; font-family:Cairo,sans-serif; cursor:pointer; }
  .upload-btn:active { background:rgba(204,34,0,0.12); }
  .upload-btn.uploaded { border-color:#1a1a1a; background:rgba(0,0,0,0.04); color:#1a1a1a; }
  .field { margin-bottom:10px; }
  .field label { font-size:12px; color:#999; display:block; margin-bottom:5px; }
  .field input { width:100%; padding:11px 13px; background:#fafafa; border:1px solid #eee;
    border-radius:10px; color:#111; font-family:Cairo,sans-serif; font-size:14px; outline:none; }
  .field input:focus { border-color:#CC2200; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .save-btn { width:100%; padding:15px; border-radius:14px; border:none;
    background:linear-gradient(135deg,#CC2200,#ff3300); color:#fff;
    font-size:16px; font-weight:900; font-family:Cairo,sans-serif; cursor:pointer;
    box-shadow:0 4px 20px rgba(204,34,0,0.35); }
  .save-btn:active { transform:scale(0.98); }
  .save-btn:disabled { opacity:0.6; }
  .status { text-align:center; font-size:13px; color:#CC2200; margin-top:8px; min-height:20px; font-weight:700; }
  .ios-hint { background:#fff5f5; border:1px solid #f0d0cc; border-radius:12px; padding:12px;
    font-size:12px; color:#CC2200; line-height:1.6; margin-top:8px; display:none; }
  .ios-hint.show { display:block; }
</style>
</head>
<body>
<div class="app">
  <h1>🎯 Arsenal Center — Story Builder</h1>
  <div class="preview-box" id="preview-box">
    <canvas id="story-canvas"></canvas>
  </div>
  <div class="card">
    <div class="card-title">📷 صورة المنتج</div>
    <input type="file" accept="image/*" id="img-input" style="display:none;" onchange="handleImage(event)">
    <button class="upload-btn" id="upload-btn" type="button" onclick="document.getElementById('img-input').click()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span id="file-label">اضغط لاختيار صورة</span>
    </button>
  </div>
  <div class="card">
    <div class="card-title">📦 المنتج</div>
    <div class="field"><label>اسم المنتج</label><input type="text" id="prod-name" value="iPhone 16 Pro Max" oninput="update()" dir="ltr"></div>
    <div class="field"><label>الوصف بالعربي</label><input type="text" id="prod-sub" value="أحدث إصدار من آبل" oninput="update()" dir="rtl"></div>
    <div class="grid2">
      <div class="field"><label>السعر</label><input type="text" id="prod-price" value="1,650,000" oninput="update()" dir="ltr"></div>
      <div class="field"><label>العملة</label><input type="text" id="prod-currency" value="د.ع" oninput="update()" dir="rtl"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">✅ المواصفات</div>
    <div class="field"><input type="text" id="feat1" value="شاشة 6.9 انش Super Retina" oninput="update()" dir="rtl"></div>
    <div class="field"><input type="text" id="feat2" value="كاميرا 48MP مع 4K ProRes" oninput="update()" dir="rtl"></div>
    <div class="field"><input type="text" id="feat3" value="شريحة A18 Pro" oninput="update()" dir="rtl"></div>
  </div>
  <button class="save-btn" id="btn-dl" onclick="downloadPNG()">⬇️ حفظ الستوري</button>
  <div class="status" id="status-msg"></div>
  <div class="ios-hint" id="ios-hint">📱 <strong>للحفظ على آيفون:</strong><br>اضغط مطولاً على الصورة ← Save to Photos</div>
</div>

  document.getElementById('file-label').textContent='✅ '+file.name;
  const reader=new FileReader();
  reader.onload=ev=>{ const img=new Image(); img.onload=()=>{currentImg=img;update();}; img.src=ev.target.result; };
  reader.readAsDataURL(file);
}

function getVals(){
  return {
    name: document.getElementById('prod-name').value,
    sub: document.getElementById('prod-sub').value,
    price: document.getElementById('prod-price').value,
    currency: document.getElementById('prod-currency').value,
    f1: document.getElementById('feat1').value,
    f2: document.getElementById('feat2').value,
    f3: document.getElementById('feat3').value,
  };
}

function rrPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function rr(ctx,x,y,w,h,r,fill){rrPath(ctx,x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();}

function drawStory(ctx,v,s,img){
  const RED='#CC2200', LRED='#ff3300', WH='#ffffff', BK='#111111';

  // ── BACKGROUND white ──
  ctx.fillStyle=WH; ctx.fillRect(0,0,W*s,H*s);

  // Subtle red glow top-right
  const g=ctx.createRadialGradient(W*s,0,0,W*s,0,550*s);
  g.addColorStop(0,'rgba(204,34,0,0.07)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,W*s,H*s);

  // Subtle bottom left glow
  const g2=ctx.createRadialGradient(0,H*s,0,0,H*s,400*s);
  g2.addColorStop(0,'rgba(204,34,0,0.05)'); g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2; ctx.fillRect(0,0,W*s,H*s);

  // ── TOP RED BAR ──
  const barG=ctx.createLinearGradient(0,0,W*s,0);
  barG.addColorStop(0,RED); barG.addColorStop(0.5,LRED); barG.addColorStop(1,RED);
  ctx.fillStyle=barG; ctx.fillRect(0,0,W*s,12*s);

  // ── BRAND NAME centered, pushed down, glowing ──
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowColor=RED; ctx.shadowBlur=28*s;
  ctx.fillStyle=LRED; ctx.font=`900 ${50*s}px Arial,sans-serif`;
  ctx.fillText('ARSENAL CENTER', W*s/2, 80*s);
  ctx.restore();

  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillStyle='#333'; ctx.font=`700 ${22*s}px Arial,sans-serif`;
  ctx.fillText('FOR ELECTRONICS', W*s/2, 140*s);
  ctx.restore();

  // ── DECORATIVE SQUARES on background ──
  ctx.save();

  ctx.strokeStyle=RED; ctx.lineWidth=3*s;
  const sq = [
    // top-right
    [W-200,80,140,140,0.07],[W-160,120,140,140,0.06],[W-240,50,90,90,0.05],
    [W-130,60,60,60,0.08],[W-300,140,70,70,0.05],
    // top-left
    [20,80,120,120,0.06],[50,110,100,100,0.05],[10,50,70,70,0.07],
    [80,60,55,55,0.06],[30,180,80,80,0.04],
    // bottom-right
    [W-180,H-260,130,130,0.07],[W-140,H-220,100,100,0.06],[W-220,H-290,80,80,0.05],
    [W-100,H-180,60,60,0.08],[W-260,H-240,65,65,0.05],
    // bottom-left
    [20,H-270,130,130,0.07],[55,H-230,100,100,0.06],[10,H-310,80,80,0.05],
    [80,H-190,65,65,0.08],[30,H-350,55,55,0.04],
    // mid-right
    [W-100,700,90,90,0.05],[W-140,760,70,70,0.06],[W-80,820,55,55,0.04],
    [W-120,640,50,50,0.07],[W-170,870,80,80,0.04],
    // mid-left
    [20,700,85,85,0.05],[50,760,65,65,0.06],[15,820,55,55,0.04],
    [60,640,50,50,0.07],[20,870,75,75,0.04],
    // CENTER mid area
    [W/2-200,500,60,60,0.05],[W/2+140,520,55,55,0.05],
    [W/2-180,560,40,40,0.06],[W/2+160,575,40,40,0.06],
    [W/2-220,480,30,30,0.07],[W/2+190,490,30,30,0.07],
    [W/2-100,1350,70,70,0.05],[W/2+50,1370,55,55,0.05],
    [W/2-130,1400,40,40,0.06],[W/2+80,1420,40,40,0.06],
  ];
  sq.forEach(([x,y,w,h,a])=>{
    ctx.globalAlpha=a;
    ctx.strokeRect(x*s,y*s,w*s,h*s);
  });

  // Small filled red squares
  ctx.fillStyle=RED;
  const dots = [
    [W-55,170,16,0.15],[W-75,230,12,0.12],[W-45,300,20,0.10],
    [W-90,350,14,0.12],[W-60,420,10,0.14],[W-80,480,16,0.10],
    [30,170,16,0.15],[50,240,12,0.12],[25,310,20,0.10],
    [60,380,14,0.12],[35,450,10,0.14],
    [W-55,H-160,16,0.15],[W-75,H-230,12,0.12],[W-45,H-300,20,0.10],
    [30,H-160,16,0.15],[50,H-240,12,0.12],[25,H-320,20,0.10],
    // center dots
    [W/2-240,510,12,0.10],[W/2+220,530,10,0.10],
    [W/2-250,560,8,0.12],[W/2+230,580,8,0.12],
    [W/2-80,1360,12,0.10],[W/2+110,1380,10,0.10],
    [W-55,750,14,0.12],[25,750,14,0.12],
    [W-45,900,10,0.10],[35,900,10,0.10],
  ];
  dots.forEach(([x,y,sz,a])=>{
    ctx.globalAlpha=a;
    ctx.fillRect(x*s,y*s,sz*s,sz*s);
  });

  // Diagonal line accents
  ctx.strokeStyle=RED; ctx.lineWidth=2*s;
  ctx.globalAlpha=0.06;
  [[W-50,80,W-20,110],[W-60,200,W-30,230],[W-55,140,W-25,170],
   [30,80,60,110],[20,200,50,230],[25,140,55,170],
   [W-50,H-80,W-20,H-110],[30,H-80,60,H-110],
   [W-50,780,W-20,810],[30,780,60,810]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1*s,y1*s); ctx.lineTo(x2*s,y2*s); ctx.stroke();
  });

  ctx.restore();

  // ── PRODUCT IMAGE ──
  const imgX=100*s, imgY=220*s, imgW=(W-200)*s, imgH=580*s, imgR=24*s;

  ctx.shadowColor='rgba(0,0,0,0.12)'; ctx.shadowBlur=35*s; ctx.shadowOffsetY=12*s;
  rr(ctx,imgX,imgY,imgW,imgH,imgR,'#f9f9f9');
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  if(img){
    ctx.save();
    rrPath(ctx,imgX,imgY,imgW,imgH,imgR); ctx.clip();
    const ar=img.width/img.height, car=imgW/imgH;
    let dx,dy,dw,dh;
    if(ar>car){dh=imgH;dw=dh*ar;dx=imgX-(dw-imgW)/2;dy=imgY;}
    else{dw=imgW;dh=dw/ar;dx=imgX;dy=imgY-(dh-imgH)/2;}
    ctx.drawImage(img,dx,dy,dw,dh);
    ctx.restore();
  } else {
    ctx.fillStyle='#eee'; ctx.font=`400 ${28*s}px Cairo,Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('اضغط لاختيار صورة المنتج',W*s/2,imgY+imgH/2);
  }

  // Red border
  ctx.strokeStyle='rgba(204,34,0,0.25)'; ctx.lineWidth=2*s;
  rrPath(ctx,imgX,imgY,imgW,imgH,imgR); ctx.stroke();

  // ── PRODUCT NAME ──
  const nameY=imgY+imgH+36*s;

  // Decorative squares around name area
  ctx.save();
  ctx.strokeStyle=RED; ctx.lineWidth=2.5*s;
  // left of name
  ctx.globalAlpha=0.12; ctx.strokeRect(40*s, nameY+5*s, 50*s, 50*s);
  ctx.globalAlpha=0.08; ctx.strokeRect(52*s, nameY+17*s, 50*s, 50*s);
  ctx.globalAlpha=0.10; ctx.strokeRect(30*s, nameY-10*s, 30*s, 30*s);
  // right of name
  ctx.globalAlpha=0.12; ctx.strokeRect((W-90)*s, nameY+5*s, 50*s, 50*s);
  ctx.globalAlpha=0.08; ctx.strokeRect((W-102)*s, nameY+17*s, 50*s, 50*s);
  ctx.globalAlpha=0.10; ctx.strokeRect((W-70)*s, nameY-10*s, 30*s, 30*s);
  // small filled dots
  ctx.fillStyle=RED;
  ctx.globalAlpha=0.18; ctx.fillRect(42*s,(nameY+62)*s,12*s,12*s);
  ctx.globalAlpha=0.14; ctx.fillRect(58*s,(nameY+75)*s,8*s,8*s);
  ctx.globalAlpha=0.18; ctx.fillRect((W-54)*s,(nameY+62)*s,12*s,12*s);
  ctx.globalAlpha=0.14; ctx.fillRect((W-66)*s,(nameY+75)*s,8*s,8*s);
  ctx.restore();

  ctx.fillStyle=BK; ctx.font=`900 ${56*s}px Cairo,Arial`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(v.name, W*s/2, nameY);

  ctx.fillStyle='#555'; ctx.font=`400 ${30*s}px Cairo,Arial`;
  ctx.fillText(v.sub, W*s/2, nameY+72*s);

  // ── DIVIDER ──
  const divY=nameY+130*s;
  const dg=ctx.createLinearGradient(W*s/2-130*s,0,W*s/2+130*s,0);
  dg.addColorStop(0,'transparent'); dg.addColorStop(0.5,RED); dg.addColorStop(1,'transparent');
  ctx.fillStyle=dg; ctx.fillRect(W*s/2-130*s,divY,260*s,3*s);

  // ── SPEC BOXES ──
  const feats=[v.f1,v.f2,v.f3].filter(Boolean);
  const specY=divY+22*s;
  const bGap=14*s, bH=90*s;
  const bW=((W-80)*s - bGap*(feats.length-1))/feats.length;

  feats.forEach((f,i)=>{
    const bx=40*s+i*(bW+bGap);
    ctx.shadowColor='rgba(204,34,0,0.08)'; ctx.shadowBlur=10*s;
    rr(ctx,bx,specY,bW,bH,14*s,WH);
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(204,34,0,0.3)'; ctx.lineWidth=1.5*s;
    rrPath(ctx,bx,specY,bW,bH,14*s); ctx.stroke();
    rr(ctx,bx,specY+10*s,4*s,bH-20*s,2*s,RED);
    ctx.fillStyle=BK; ctx.font=`700 ${20*s}px Cairo,Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const maxW=bW-20*s;
    const words=f.split(' '); let lines=[],line='';
    words.forEach(w=>{const t=line?line+' '+w:w; if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;});
    if(line)lines.push(line);
    const lh=26*s, sy=specY+bH/2-(lines.length-1)*lh/2;
    lines.forEach((l,li)=>ctx.fillText(l,bx+bW/2,sy+li*lh));
  });

  // Decorative squares around spec area
  ctx.save();
  ctx.strokeStyle=RED; ctx.lineWidth=2*s;
  ctx.globalAlpha=0.10; ctx.strokeRect(40*s, specY-8*s, 35*s, 35*s);
  ctx.globalAlpha=0.07; ctx.strokeRect(28*s, specY+4*s, 35*s, 35*s);
  ctx.globalAlpha=0.10; ctx.strokeRect((W-75)*s, specY-8*s, 35*s, 35*s);
  ctx.globalAlpha=0.07; ctx.strokeRect((W-63)*s, specY+4*s, 35*s, 35*s);
  ctx.fillStyle=RED;
  ctx.globalAlpha=0.15; ctx.fillRect(44*s,(specY+bH+6)*s,10*s,10*s);
  ctx.globalAlpha=0.12; ctx.fillRect(30*s,(specY+bH+18)*s,8*s,8*s);
  ctx.globalAlpha=0.15; ctx.fillRect((W-54)*s,(specY+bH+6)*s,10*s,10*s);
  ctx.globalAlpha=0.12; ctx.fillRect((W-40)*s,(specY+bH+18)*s,8*s,8*s);
  ctx.restore();

  // ── PRICE ──
  const pY=specY+bH+36*s;
  const pG=ctx.createLinearGradient(40*s,pY,(W-40)*s,pY);
  pG.addColorStop(0,RED); pG.addColorStop(0.5,LRED); pG.addColorStop(1,RED);
  ctx.shadowColor='rgba(204,34,0,0.25)'; ctx.shadowBlur=22*s;
  rr(ctx,40*s,pY,(W-80)*s,215*s,26*s,pG);
  ctx.shadowBlur=0;

  // white shine
  const sh=ctx.createLinearGradient(40*s,pY,40*s,pY+70*s);
  sh.addColorStop(0,'rgba(255,255,255,0.2)'); sh.addColorStop(1,'transparent');
  rr(ctx,50*s,pY+8*s,(W-100)*s,65*s,16*s,sh);

  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font=`400 ${26*s}px Cairo,Arial`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('السعر الحصري',W*s/2,pY+22*s);
  ctx.fillStyle=WH; ctx.font=`900 ${86*s}px Cairo,Arial`;
  ctx.fillText(v.price,W*s/2,pY+56*s);
  ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.font=`700 ${28*s}px Cairo,Arial`;
  ctx.fillText(v.currency,W*s/2,pY+156*s);

  // ── CTA ──
  const ctaY=pY+252*s;
  rr(ctx,80*s,ctaY,(W-160)*s,86*s,43*s,BK);
  ctx.fillStyle=WH; ctx.font=`900 ${30*s}px Cairo,Arial`;
  ctx.textBaseline='middle';
  ctx.fillText('📲 تواصل معنا الآن',W*s/2,ctaY+43*s);

  ctx.fillStyle='#aaa'; ctx.font=`400 ${22*s}px Cairo,Arial`;
  ctx.textBaseline='top';
  ctx.fillText('راسلنا عبر الرسائل المباشرة',W*s/2,ctaY+102*s);

  // ── BOTTOM RED BAR ──
  ctx.fillStyle=barG; ctx.fillRect(0,H*s-10*s,W*s,10*s);
}

function update(){
  const box=document.getElementById('preview-box');
  const canvas=document.getElementById('story-canvas');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const dw=box.clientWidth, dh=box.clientHeight;
  canvas.width=dw*dpr; canvas.height=dh*dpr;
  canvas.style.width=dw+'px'; canvas.style.height=dh+'px';
  drawStory(canvas.getContext('2d'),getVals(),(dw*dpr)/W,currentImg);
}

function downloadPNG(){
  const btn=document.getElementById('btn-dl'), msg=document.getElementById('status-msg'), hint=document.getElementById('ios-hint');
  btn.textContent='⏳ جاري التصدير...'; btn.disabled=true;
  const off=document.createElement('canvas'); off.width=W; off.height=H;
  drawStory(off.getContext('2d'),getVals(),1,currentImg);
  setTimeout(()=>{
    const dataUrl=off.toDataURL('image/png');
    if(isIOS){
      const win=window.open();
      win.document.write('<html><body style="margin:0;background:#000"><img src="'+dataUrl+'" style="width:100%;display:block"><p style="font-family:sans-serif;text-align:center;padding:16px;color:#CC2200;font-size:15px">اضغط مطولاً على الصورة ← Save to Photos 📱</p></body></html>');
      win.document.close(); hint.classList.add('show');
    } else {
      const a=document.createElement('a'); a.download='story_arsenal.png'; a.href=dataUrl; a.click();
    }
    btn.textContent='⬇️ حفظ الستوري'; btn.disabled=false;
    msg.textContent='✅ تم!'; setTimeout(()=>{msg.textContent='';hint.classList.remove('show');},6000);
  },300);
}

window.addEventListener('resize',update);
window.addEventListener('load',()=>setTimeout(update,300));
</script>
